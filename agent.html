<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>👮 Agent – Dedienɔ | MILLES SERVICES</title><link rel="icon" type="image/x-icon" href="favicon.ico"/><style>:root{--cpefpa-primary:#1e40af;--cpefpa-secondary:#059669;--cpefpa-accent:#f59e0b;--cpefpa-bg:#0f172a;--cpefpa-card:#1e293b;--cpefpa-text:#fff;--cpefpa-muted:#94a3b8}*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Segoe UI',system-ui,sans-serif;background:linear-gradient(135deg,var(--cpefpa-primary),var(--cpefpa-secondary));color:var(--cpefpa-text);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}.card{background:var(--cpefpa-card);padding:24px;border-radius:20px;max-width:420px;width:100%;text-align:center;box-shadow:0 20px 40px rgba(0,0,0,0.3);border:2px solid var(--cpefpa-primary)}.brand{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:16px;padding-bottom:16px;border-bottom:2px solid var(--cpefpa-accent)}.brand img{width:40px;height:40px;border-radius:8px;object-fit:cover;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,0.2)}.brand h2{font-size:18px;font-weight:700}.brand small{display:block;font-size:11px;color:var(--cpefpa-muted);margin-top:4px}.input-group{margin:12px 0;text-align:left}label{display:block;font-size:13px;color:var(--cpefpa-muted);margin-bottom:6px}input,select{width:100%;padding:12px;border-radius:10px;border:1px solid #334155;background:#0f172a;color:#fff;font-size:15px}input:disabled,select:disabled{opacity:0.7}.btn{width:100%;padding:14px;margin:10px 0;border:none;border-radius:12px;font-weight:600;cursor:pointer;font-size:15px}.btn:disabled{opacity:0.6;cursor:not-allowed}.green{background:#22c55e;color:#fff}.red{background:#ef4444;color:#fff;animation:pulse 2s infinite}@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.02)}}.status{margin-top:16px;padding:12px;border-radius:10px;background:#0f172a;font-size:14px;min-height:44px}.status.ok{color:#22c55e}.status.err{color:#ef4444}.coords{font-family:monospace;font-size:12px;color:var(--cpefpa-muted);margin-top:10px;padding:10px;background:#0f172a;border-radius:8px}.confirm{background:#334155;padding:16px;border-radius:12px;margin:12px 0;display:none}.confirm.active{display:block}.confirm-btn{background:#3b82f6;color:#fff;padding:10px 20px;border:none;border-radius:8px;cursor:pointer;margin:4px}.confirm-btn.secondary{background:#64748b}.footer{margin-top:20px;font-size:11px;color:var(--cpefpa-muted);padding-top:16px;border-top:1px solid #334155}</style></head><body><div class="card"><div class="brand"><img src="logo.png" alt="Logo MILLES SERVICES"/><div><h2>👮 Agent Dedienɔ</h2><small>MILLES SERVICES • Togo 🇹🇬</small></div></div><div class="input-group"><label>Votre nom *</label><input id="n" placeholder="Ex: Agent Kossi" maxlength="50"/></div><div class="input-group"><label>Site d'affectation *</label><select id="s"><option value="">-- Choisir un site --</option><option value="Lomé-Centre">🏢 Lomé-Centre</option><option value="Agoè-Nyivé">🏘️ Agoè-Nyivé</option><option value="Bè-Kpota">🏭 Bè-Kpota</option><option value="Tokoin">🏥 Tokoin</option><option value="Nyékonakpoè">🏘️ Nyékonakpoè</option><option value="Adidogomé">🏢 Adidogomé</option><option value="Kégué">🏭 Kégué</option><option value="Zongo">🕌 Zongo</option><option value="Autre">📍 Autre site</option></select></div><button class="btn green" id="sb">📍 Démarrer le pointage GPS</button><div class="confirm" id="confirm"><p style="margin:0 0 12px;font-size:14px">🔍 Vérifie tes informations :</p><p id="confirm-text" style="margin:0 0 12px;font-weight:600"></p><button class="confirm-btn" id="confirm-yes">✅ Confirmer</button><button class="confirm-btn secondary" id="confirm-no">✏️ Modifier</button></div><button class="btn red" id="sosb" style="display:none">🚨 ENVOYER SOS</button><div class="status" id="st">En attente...</div><div class="coords" id="cd">📍 En attente...</div><button class="btn" style="background:#64748b;margin-top:12px" onclick="window.logout()">🔒 Déconnexion</button></div><script type="module">import{auth}from"./js/firebase-config.js";import{onAuthStateChanged,signOut}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";onAuthStateChanged(auth,u=>{if(!u)window.location.href="login.html";});window.logout=()=>signOut(auth).then(()=>window.location.href="login.html");import{db,ref,set,push}from'./js/firebase-config.js';let id=null,run=false,nom='',site='',gpsInt=null;const sb=document.getElementById('sb'),sosb=document.getElementById('sosb'),st=document.getElementById('st'),cd=document.getElementById('cd'),confirmBox=document.getElementById('confirm'),confirmText=document.getElementById('confirm-text'),confirmYes=document.getElementById('confirm-yes'),confirmNo=document.getElementById('confirm-no');sb.onclick=()=>{nom=document.getElementById('n').value.trim();site=document.getElementById('s').value;if(!nom){st.textContent='❌ Entrez votre nom';st.className='status err';return;}if(!site){st.textContent='❌ Sélectionnez un site';st.className='status err';return;}confirmText.textContent=`👤 ${nom} • 📍 ${site}`;confirmBox.classList.add('active');sb.disabled=true;st.textContent='🔍 Vérifie avant de continuer...';};confirmNo.onclick=()=>{confirmBox.classList.remove('active');sb.disabled=false;st.textContent='En attente...';};confirmYes.onclick=async()=>{confirmBox.classList.remove('active');st.textContent='📡 Connexion...';try{id='ag_'+Math.random().toString(36).substr(2,9)+'_'+Date.now();await set(ref(db,'agents/'+id),{name:nom,site,status:'online',lastPing:Date.now()});document.getElementById('n').disabled=true;document.getElementById('s').disabled=true;sosb.style.display='block';st.textContent='✅ Connecté & GPS actif';st.className='status ok';run=true;startGPS();}catch(e){st.textContent='❌ Erreur: '+e.message;st.className='status err';sb.disabled=false;}};function startGPS(){gpsInt=setInterval(async()=>{if(!run)return clearInterval(gpsInt);let la,lo,acc=null;if(navigator.geolocation){try{const p=await new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(res,rej,{enableHighAccuracy:true,timeout:10000,maximumAge:0}));la=p.coords.latitude;lo=p.coords.longitude;acc=p.coords.accuracy;}catch{la=6.1256+(Math.random()-.5)*.001;lo=1.2244+(Math.random()-.5)*.001;}}else{la=6.1256+(Math.random()-.5)*.001;lo=1.2244+(Math.random()-.5)*.001;}await set(ref(db,'agents/'+id),{name:nom,site,status:'online',lat:la,lng:lo,accuracy:acc,lastPing:Date.now()});cd.textContent='📍 '+la.toFixed(6)+', '+lo.toFixed(6)+(acc?' ±'+Math.round(acc)+'m':'');},15000);window.addEventListener('beforeunload',()=>{run=false;if(gpsInt)clearInterval(gpsInt);if(id)set(ref(db,'agents/'+id+'/status'),'offline').catch(()=>{});});}sosb.onclick=async()=>{if(!id)return alert('⚠️ Activez d\'abord le GPS');if(!confirm('🚨 Confirmer l\'envoi SOS ?'))return;try{await push(ref(db,'alerts'),{id:'s_'+Date.now(),agentId:id,agentName:nom,site,timestamp:Date.now(),played:false});st.textContent='🚨 SOS ENVOYÉ !';st.className='status err';sosb.disabled=true;setTimeout(()=>{if(run){st.textContent='✅ GPS actif';st.className='status ok';sosb.disabled=false;}},30000);}catch(e){alert('Erreur: '+e.message);}};</script></body></html>
