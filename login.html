<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>🔐 Connexion – Dedienɔ</title><style>:root{--p:#1e40af;--s:#059669;--a:#f59e0b}*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Segoe UI',system-ui,sans-serif;background:linear-gradient(135deg,var(--p),var(--s));color:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}.card{background:#1e293b;padding:32px;border-radius:20px;max-width:380px;width:100%;text-align:center;box-shadow:0 20px 40px rgba(0,0,0,0.3);border:2px solid var(--p)}.brand{margin-bottom:24px}.brand img{width:48px;height:48px;border-radius:10px}.brand h1{font-size:20px;margin-top:8px}.brand small{color:#94a3b8;font-size:12px}input{width:100%;padding:14px;margin:8px 0;border-radius:10px;border:1px solid #334155;background:#0f172a;color:#fff;font-size:15px}input:focus{outline:none;border-color:var(--a)}.btn{width:100%;padding:14px;margin:12px 0;border:none;border-radius:12px;font-weight:600;cursor:pointer;font-size:15px;background:var(--s);color:#fff;transition:0.2s}.btn:hover{transform:translateY(-2px)}.err{color:#ef4444;font-size:13px;margin-top:8px;min-height:20px}.foot{margin-top:24px;font-size:11px;color:#64748b}</style></head><body><div class="card"><div class="brand"><img src="logo.png" alt="Logo"/><h1>🔐 Dedienɔ</h1><small>MILLES SERVICES • Togo 🇹🇬</small></div><input id="id" placeholder="Identifiant (ex: AGT001)" autocomplete="username"/><input id="pass" type="password" placeholder="Mot de passe" autocomplete="current-password"/><button class="btn" id="login">Se connecter</button><div class="err" id="err"></div><div class="foot">© 2026 MILLES SERVICES</div></div><script type="module">import{auth}from'./js/firebase-config.js';import{signInWithEmailAndPassword}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";import{getDatabase,ref,get}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";const db=getDatabase(auth.app);document.getElementById('login').onclick=async()=>{const id=document.getElementById('id').value.trim().toUpperCase();const pass=document.getElementById('pass').value;const err=document.getElementById('err');if(!id||!pass){err.textContent="❌ Remplis tous les champs";return;}try{err.textContent="⏳ Connexion...";const user=await signInWithEmailAndPassword(auth,`${id}@millesservices.tg`,pass);const snap=await get(ref(db,`users/${user.user.uid}`));const role=snap.val()?.role||'agent';if(role==='superviseur')window.location.href='index.html';else window.location.href='agent.html';}catch(e){err.textContent="❌ Identifiant ou mot de passe incorrect";console.error(e);}};</script></body></html>
