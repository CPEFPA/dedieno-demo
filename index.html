<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>📍 Dedienɔ – MILLES SERVICES - Togo</title><link rel="icon" type="image/x-icon" href="favicon.ico"/><link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/><style>:root{--cpefpa-primary:#1e40af;--cpefpa-secondary:#059669;--cpefpa-accent:#f59e0b;--cpefpa-bg:#f8fafc;--cpefpa-card:#fff;--cpefpa-text:#1e293b;--cpefpa-muted:#64748b}*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--cpefpa-bg);color:var(--cpefpa-text);display:grid;grid-template-columns:280px 1fr;min-height:100vh}.brand-header{padding:12px 16px;background:linear-gradient(135deg,var(--cpefpa-primary),var(--cpefpa-secondary));color:#fff;border-bottom:3px solid var(--cpefpa-accent)}.brand-header h2{font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px}.brand-header small{opacity:.9;font-weight:400}aside{background:var(--cpefpa-card);border-right:1px solid #e2e8f0;overflow-y:auto;display:flex;flex-direction:column}#map{height:100vh}.leaflet-popup-content-wrapper{border-radius:12px;border:2px solid var(--cpefpa-primary)}.card{padding:12px;margin:6px 0;border-radius:10px;background:var(--cpefpa-card);border:1px solid #e2e8f0;border-left:4px solid var(--cpefpa-secondary);cursor:pointer;transition:all 0.2s}.card:hover{transform:translateX(4px);box-shadow:0 4px 12px rgba(30,64,175,0.15)}.card.online{border-left-color:var(--cpefpa-secondary)}.card.offline{border-left-color:var(--cpefpa-muted);opacity:.8}.sos{background:#fef2f2;border:2px solid #fecaca;padding:12px;margin:6px 0;border-radius:10px;animation:pulse 1.5s infinite}@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0.4)}50%{box-shadow:0 0 0 12px rgba(239,68,68,0)}}.refresh{padding:8px 16px;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;margin:4px 0;color:#fff;transition:0.2s}.btn-primary{background:var(--cpefpa-primary)}.btn-primary:hover{background:#1d4ed8}.btn-secondary{background:var(--cpefpa-secondary)}.btn-secondary:hover{background:#047857}.debug{padding:6px;margin:6px 0;border-radius:6px;font-size:11px;font-family:monospace;max-height:100px;overflow-y:auto;background:#f1f5f9}.debug.ok{color:var(--cpefpa-secondary)}.debug.err{color:#dc2626}@media(max-width:768px){body{grid-template-columns:1fr}aside{max-height:40vh;border-right:none;border-bottom:1px solid #e2e8f0}}</style></head><body><aside><div class="brand-header"><h2><img src="logo.png" alt="Logo" style="width:24px;height:24px;border-radius:4px"/>Dedienɔ<small style="display:block;font-size:11px;margin-top:2px">MILLES SERVICES • Togo 🇹🇬</small></h2></div><h3 style="padding:0 12px 8px">👥 Agents (<span id="cnt">0</span>)</h3><button class="refresh btn-primary" style="margin:0 12px" onclick="forceRefresh()">🔄 Actualiser</button><button class="refresh btn-secondary" style="margin:0 12px" onclick="window.exportCSV()">📊 Exporter CSV</button><div id="debug" style="margin:0 12px"></div><div id="list" style="padding:0 12px"></div><button class="refresh btn-primary" style="margin:12px" onclick="window.logout()">🔒 Déconnexion</button><h3 style="padding:16px 12px 8px;border-top:1px solid #e2e8f0;margin-top:8px">🚨 Alertes SOS</h3><div id="sos" style="padding:0 12px 12px"></div></aside><main><div id="map"></div></main><script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script><script type="module">import{auth}from"./js/firebase-config.js";import{onAuthStateChanged,signOut}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";onAuthStateChanged(auth,u=>{if(!u)window.location.href="login.html";});window.logout=()=>signOut(auth).then(()=>window.location.href="login.html");import{db,ref,onValue}from'./js/firebase-config.js';const debug=document.getElementById('debug');function log(m,t='info'){debug.innerHTML+=`<div class="debug ${t}">[${new Date().toLocaleTimeString()}] ${m}</div>`;debug.scrollTop=debug.scrollHeight;}log('🔌 Init...','ok');const map=L.map('map').setView([6.1256,1.2244],13);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);const mkrs={},agentsRef=ref(db,'agents'),alertsRef=ref(db,'alerts'),dbUrl='https://dedieno-demo-default-rtdb.europe-west1.firebasedatabase.app';function playSOSAlert(){const audio=new Audio('https://actions.google.com/sounds/v1/alarms/air_horn.ogg');audio.volume=1.0;let c=0;const i=setInterval(()=>{audio.currentTime=0;audio.play().catch(()=>{});c++;if(c>=3)clearInterval(i);},800);if(navigator.vibrate)navigator.vibrate([500,200,500,200,500]);}function renderAgents(agents){const cnt=document.getElementById('cnt'),list=document.getElementById('list');cnt.textContent=Object.keys(agents).length;list.innerHTML='';if(!Object.keys(agents).length){list.innerHTML='<div style="color:var(--cpefpa-muted);font-size:13px;padding:8px">🟡 Aucun agent en ligne</div>';return;}Object.entries(agents).forEach(([id,a])=>{const c=document.createElement('div');c.className=`card ${a.status||'offline'}`;c.innerHTML=`<b>${a.name||'?'}</b> <span style="color:${a.status==='online'?'var(--cpefpa-secondary)':'var(--cpefpa-muted)'}">● ${a.status||'off'}</span><br><small>📍 ${a.site||''}</small>`;c.onclick=()=>{if(a.lat&&a.lng){map.setView([a.lat,a.lng],16);mkrs[id]?.openPopup();}};list.appendChild(c);if(a.lat&&a.lng){const col=a.status==='online'?'var(--cpefpa-secondary)':'var(--cpefpa-muted)';if(!mkrs[id]){mkrs[id]=L.marker([a.lat,a.lng],{icon:L.divIcon({className:'c',html:`<div style="background:${col};width:14px;height:14px;border-radius:50%;border:3px solid #fff;box-shadow:0 3px 8px rgba(0,0,0,0.3)"></div>`,iconSize:[20,20],iconAnchor:[10,10]})}).addTo(map).bindPopup(`<b>${a.name||'Agent'}</b><br>📍 ${a.site||''}<br><small style="color:#64748b">${a.lat?.toFixed(6)}, ${a.lng?.toFixed(6)}<br>${a.accuracy?`🎯 Précision: ±${Math.round(a.accuracy)}m`:''}</small><br><small>🕐 ${a.lastPing?new Date(a.lastPing).toLocaleTimeString('fr-FR'):''}</small>`);}else{mkrs[id].setLatLng([a.lat,a.lng]);}}});log(`✅ ${Object.keys(agents).length} agents affichés`,'ok');}onValue(agentsRef,s=>{log('📡 onValue agents','ok');renderAgents(s.val()||{});},{onlyOnce:false});setTimeout(()=>{if(document.getElementById('cnt').textContent==='0'){log('⏳ Fallback fetch...','info');fetch(`${dbUrl}/agents.json?cache=${Date.now()}`).then(r=>r.json()).then(d=>{if(d)renderAgents(d);}).catch(e=>log('❌ Fetch: '+e.message,'err'));}},2500);window.forceRefresh=()=>{log('🔄 Refresh...','info');fetch(`${dbUrl}/.json?cache=${Date.now()}`).then(r=>r.json()).then(d=>{if(d?.agents)renderAgents(d.agents);}).catch(e=>log('❌ '+e.message,'err'));};window.exportCSV=()=>{log('📊 Génération CSV...','info');fetch(`${dbUrl}/.json?cache=${Date.now()}`).then(r=>r.json()).then(data=>{let csv='\uFEFFType,ID,Nom,Site,Lat,Lng,Date/Heure,Statut\n';if(data.agents)Object.entries(data.agents).forEach(([id,a])=>{csv+=`Agent,${id},"${a.name||''}","${a.site||''}",${a.lat||''},${a.lng||''},${a.lastPing?new Date(a.lastPing).toLocaleString('fr-FR'):''},${a.status||'off'}\n`;});if(data.alerts)Object.entries(data.alerts).forEach(([id,a])=>{csv+=`SOS,${id},"${a.agentName||''}","${a.site||''}",${a.lat||''},${a.lng||''},${a.timestamp?new Date(a.timestamp).toLocaleString('fr-FR'):''},Alerte envoyée\n`;});const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});const u=URL.createObjectURL(blob);const a=document.createElement('a');a.href=u;a.download=`Dedieno_Export_${new Date().toISOString().slice(0,10)}.csv`;a.click();URL.revokeObjectURL(u);log('✅ CSV téléchargé !','ok');}).catch(e=>log('❌ Export échoué: '+e.message,'err'));};let played=new Set();onValue(alertsRef,s=>{const d=s.val()||{};const sos=document.getElementById('sos');sos.innerHTML='';if(!Object.keys(d).length){sos.innerHTML='<div style="color:var(--cpefpa-muted);font-size:13px;padding:8px">✅ Aucune alerte</div>';return;}Object.values(d).sort((a,b)=>(b.timestamp||0)-(a.timestamp||0)).forEach(a=>{const c=document.createElement('div');c.className='sos';c.innerHTML=`🚨 <b>${a.site||'?'}</b><br><small>👤 ${a.agentName||'?'}</small><br><small>🕐 ${a.timestamp?new Date(a.timestamp).toLocaleString('fr-FR'):''}</small>`;sos.prepend(c);if(a.id&&!played.has(a.id)){playSOSAlert();played.add(a.id);}});});log('🗺️ Dashboard prêt','ok');</script></body></html>
