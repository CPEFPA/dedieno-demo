<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>Dedienɔ Dashboard</title><link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui;background:#f1f5f9;display:grid;grid-template-columns:280px 1fr;min-height:100vh}aside{background:#fff;padding:12px;border-right:1px solid #e2e8f0;overflow-y:auto;display:flex;flex-direction:column}#map{height:100vh}.card{padding:10px;margin:6px 0;border-radius:6px;background:#fff;border:1px solid #e2e8f0}.online{border-left:4px solid #22c55e}.offline{border-left:4px solid #94a3b8;opacity:.7}.sos{background:#fef2f2;border:1px solid #fecaca;padding:10px;margin:6px 0;border-radius:6px}.debug{padding:8px;margin:8px 0;border-radius:6px;font-size:11px;font-family:monospace;max-height:150px;overflow-y:auto}.debug.ok{background:#dcfce7;color:#166534}.debug.err{background:#fee2e2;color:#991b1b}.refresh{padding:8px 16px;background:#3b82f6;color:#fff;border:none;border-radius:6px;cursor:pointer;margin:8px 0;font-size:13px}.refresh:hover{background:#2563eb}@media(max-width:768px){body{grid-template-columns:1fr}aside{max-height:40vh}}</style></head><body><aside><h3>👥 Agents (<span id="cnt">0</span>)</h3><button class="refresh" onclick="forceRefresh()">🔄 Actualiser</button><div id="debug"></div><div id="list"></div><h3 style="margin-top:16px">🚨 SOS</h3><div id="sos"></div></aside><main><div id="map"></div></main><script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script><script type="module">
import{db,ref,onValue}from'./js/firebase-config.js';
const debug=document.getElementById('debug');
function log(m,t='info'){debug.innerHTML+=`<div class="debug ${t}">[${new Date().toLocaleTimeString()}] ${m}</div>`;debug.scrollTop=debug.scrollHeight;}
log('🔌 Init...');
const map=L.map('map').setView([6.1256,1.2244],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);
const mkrs={},agentsRef=ref(db,'agents'),alertsRef=ref(db,'alerts');
const dbUrl='https://dedieno-demo-default-rtdb.europe-west1.firebasedatabase.app';
let dataReceived=false;

// Écoute temps réel
onValue(agentsRef,{
  next:(snap)=>{
    dataReceived=true;
    log('✅ Données reçues via onValue','ok');
    renderAgents(snap.val()||{});
  },
  error:(err)=>{log('❌ Erreur onValue: '+err.message,'err');if(err.code==='PERMISSION_DENIED')log('💡 Règles Firebase: mettre .read:true','info');}
});

// Fallback : fetch direct si onValue ne répond pas après 3s
setTimeout(()=>{
  if(!dataReceived){
    log('⏳ onValue silencieux → test fetch direct...','info');
    fetch(`${dbUrl}/.json`)
      .then(r=>{log(`📡 Fetch status: ${r.status}`,'info');return r.json();})
      .then(d=>{
        log('✅ Fetch OK: '+JSON.stringify(d).substring(0,120)+'...','ok');
        if(d?.agents)renderAgents(d.agents);
        else log('⚠️ Structure inattendue: '+Object.keys(d||{}).join(','),'info');
      })
      .catch(e=>log('❌ Fetch échoué: '+e.message,'err'));
  }
},3000);

// Rendu des agents
function renderAgents(agents){
  const cnt=document.getElementById('cnt');
  const list=document.getElementById('list');
  cnt.textContent=Object.keys(agents).length;
  list.innerHTML='';
  if(Object.keys(agents).length===0){list.innerHTML='<div style="color:#64748b;font-size:13px;padding:8px">🟡 Aucun agent</div>';return;}
  Object.entries(agents).forEach(([id,a])=>{
    const c=document.createElement('div');c.className=`card ${a.status||'offline'}`;
    c.innerHTML=`<b>${a.name||'?'}</b> <span style="color:${a.status==='online'?'#22c55e':'#94a3b8'}">● ${a.status||'off'}</span><br><small>📍 ${a.site||''}</small>`;
    list.appendChild(c);
    if(a.lat&&a.lng){
      const col=a.status==='online'?'#22c55e':'#94a3b8';
      if(!mkrs[id])mkrs[id]=L.marker([a.lat,a.lng],{icon:L.divIcon({className:'c',html:`<div style="background:${col};width:12px;height:12px;border-radius:50%;border:2px solid #fff"></div>`,iconSize:[16,16]})}).addTo(map).bindPopup(`<b>${a.name||'Agent'}</b><br>${a.site||''}`);
      else mkrs[id].setLatLng([a.lat,a.lng]);
    }
  });
}

// Bouton refresh manuel
window.forceRefresh=()=>{
  log('🔄 Refresh forcé...','info');
  fetch(`${dbUrl}/.json?cache=${Date.now()}`)
    .then(r=>r.json()).then(d=>{if(d?.agents)renderAgents(d.agents);log('✅ Refresh OK','ok');})
    .catch(e=>log('❌ Refresh: '+e.message,'err'));
};

// SOS
let played=new Set();
onValue(alertsRef,{
  next:(snap)=>{
    const d=snap.val()||{};
    const sos=document.getElementById('sos');sos.innerHTML='';
    if(Object.keys(d).length===0){sos.innerHTML='<div style="color:#64748b;font-size:13px;padding:8px">✅ Aucune alerte</div>';return;}
    Object.values(d).sort((a,b)=>(b.timestamp||0)-(a.timestamp||0)).forEach(a=>{
      const c=document.createElement('div');c.className='sos';
      c.innerHTML=`🚨 <b>${a.site||'?'}</b><br><small>👤 ${a.agentName||'?'}</small><br><small>🕐 ${a.timestamp?new Date(a.timestamp).toLocaleString('fr-FR'):''}</small>`;
      sos.prepend(c);
      if(a.id&&!played.has(a.id)){new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg').play().catch(()=>{});played.add(a.id);}
    });
  }
});
log('🗺️ Prêt');
</script></body></html>
