<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>Dedienɔ</title>
<link rel="icon" href="image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📍</text></svg>"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{--p:#1e40af;--s:#059669;--bg:#f8fafc;--card:#fff;--txt:#1e293b;--muted:#64748b}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--txt);height:100vh;overflow:hidden}
.view{display:none;height:100%;width:100%}.view.active{display:flex;flex-direction:column;align-items:center;justify-content:center}
.grid{display:grid;grid-template-columns:260px 1fr;height:100%;width:100%}aside{background:var(--card);border-right:1px solid #e2e8f0;overflow-y:auto;display:flex;flex-direction:column;padding:12px}
#map{width:100%;height:100%}
.brand{padding:12px 16px;background:linear-gradient(135deg,var(--p),var(--s));color:#fff;border-bottom:3px solid #f59e0b;display:flex;align-items:center;gap:10px}
.brand img{width:32px;height:32px;border-radius:6px}.brand h1{font-size:18px;font-weight:700}.brand small{opacity:.8;font-size:12px}
.agent-card{margin:6px 0;padding:10px;background:var(--card);border-radius:8px;border-left:4px solid var(--s);cursor:pointer}
.agent-card:hover{transform:translateX(3px);box-shadow:0 4px 12px rgba(30,64,175,0.15)}
.sos-alert{background:#fef2f2;border:2px solid #fecaca;padding:10px;margin:6px 0;border-radius:10px;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.4)}50%{box-shadow:0 0 0 8px rgba(239,68,68,0)}}
.debug{font-size:11px;color:var(--muted);margin:4px 0;max-height:80px;overflow-y:auto;background:#f1f5f9;padding:6px;border-radius:6px}
.btn{padding:8px 16px;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;margin:4px 0;color:#fff}
.btn-primary{background:var(--p)}.btn-secondary{background:var(--s)}.btn-danger{background:#ef4444}
#view-login{background:linear-gradient(135deg,#1e40af,#059669)}
.login-card{background:#1e293b;padding:32px;border-radius:20px;max-width:380px;width:100%;text-align:center;box-shadow:0 20px 40px rgba(0,0,0,0.3);border:2px solid #1e40af;color:#fff}
.login-card img{width:48px;height:48px;border-radius:10px;margin-bottom:12px}
.login-card input{width:100%;padding:14px;margin:8px 0;border-radius:10px;border:1px solid #334155;background:#0f172a;color:#fff}
#btn-login{width:100%;padding:14px;margin:12px 0;border:none;border-radius:12px;font-weight:600;cursor:pointer;background:#22c55e;color:#fff}
.login-err{color:#ef4444;font-size:13px;margin-top:8px;min-height:20px}
#view-agent{background:linear-gradient(135deg,#1e40af,#059669);padding:20px}
.agent-panel{background:#1e293b;padding:24px;border-radius:20px;max-width:420px;width:100%;text-align:center;color:#fff}
.agent-panel input,.agent-panel select{width:100%;padding:12px;margin:6px 0;border-radius:10px;border:1px solid #334155;background:#0f172a;color:#fff}
.agent-panel button{width:100%;padding:14px;margin:10px 0;border:none;border-radius:12px;font-weight:600;cursor:pointer;color:#fff}
.agent-panel .btn-green{background:#22c55e}.agent-panel .btn-red{background:#ef4444}.agent-panel .btn-gray{background:#64748b}
</style></head><body>
<div id="view-login" class="view active"><div class="login-card"><img src="logo.png"/><h1>🔐 Dedienɔ</h1><small>MILLES SERVICES • Togo 🇹🇬</small><input id="login-id" placeholder="Identifiant (ex: SUPER, AGT001)"/><input id="login-pass" type="password" placeholder="Mot de passe"/><button id="btn-login">Se connecter</button><div id="login-err" class="login-err"></div></div></div>
<div id="view-supervisor" class="view"><div class="grid"><aside id="sup-sidebar"><div class="brand"><img src="logo.png"/><div><h1>Dedienɔ<small>Superviseur</small></div></div><h3>👥 Agents (<span id="sup-cnt">0</span>)</h3><button class="btn btn-primary" id="btn-refresh">🔄 Actualiser</button><button class="btn btn-secondary" id="btn-csv">📊 Export CSV</button><div id="sup-debug" class="debug"></div><div id="sup-list"></div><hr><h3>🚨 Alertes SOS</h3><div id="sup-sos"></div><button class="btn btn-danger" id="btn-logout">🔒 Déconnexion</button></aside><main style="height:100%;overflow:hidden"><div id="map"></div></main></div></div>
<div id="view-agent" class="view"><div class="agent-panel"><div class="brand"><img src="logo.png"/><h1>👮 Agent Dedienɔ<small>MILLES SERVICES</small></h1></div><input id="ag-name" placeholder="Nom *"/><select id="ag-site"><option value="">-- Site --</option><option value="Lomé-Centre">Lomé-Centre</option><option value="Agoè-Nyivé">Agoè-Nyivé</option><option value="Autre">Autre</option></select><button id="btn-gps" class="btn-green">📍 Pointage</button><button id="btn-sos" class="btn-red" style="display:none">🚨 SOS</button><div id="ag-status" style="margin-top:10px;padding:8px;background:#0f172a;border-radius:6px">En attente...</div><button id="btn-logout-ag" class="btn-gray">🔒 Déconnexion</button></div></div>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getDatabase,ref,onValue,set,push,get}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import{getAuth,onAuthStateChanged,signInWithEmailAndPassword,signOut}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
const app=initializeApp({apiKey:"AIzaSyBhlLLm1Vvl3U3JYFZ8rzJJW4pimYDQEEU",authDomain:"dedieno-demo.firebaseapp.com",databaseURL:"https://dedieno-demo-default-rtdb.europe-west1.firebasedatabase.app",projectId:"dedieno-demo"});
const db=getDatabase(app),auth=getAuth(app);
function showView(n){document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));document.getElementById('view-'+n).classList.add('active');}
showView('login');
onAuthStateChanged(auth,async u=>{
  console.clear();console.log('🔌 Auth:',u?.email||'null');
  if(!u)return showView('login');
  await new Promise(r=>setTimeout(r,250));
  try{
    const d=(await get(ref(db,'users/'+u.uid))).val()||{};
    const r=(d.role||'').trim().toLowerCase();
    console.log('📦 Role détecté:',r);
    if(r==='superviseur'){showView('supervisor');initSup();}
    else if(r==='agent'){showView('agent');initAg();}
    else{console.warn('⚠️ Role inconnu → login');showView('login');}
  }catch(e){console.error('❌ DB:',e);showView('login');}
});
document.getElementById('btn-login').onclick=async()=>{
  const id=document.getElementById('login-id').value.trim().toUpperCase();
  const p=document.getElementById('login-pass').value;
  const err=document.getElementById('login-err');
  err.textContent='';if(!id||!p){err.textContent='❌ Champs vides';return;}
  document.getElementById('btn-login').disabled=true;
  try{await signInWithEmailAndPassword(auth,id+'@millesservices.tg',p);}
  catch(e){err.textContent='❌ Identifiant/MDP incorrect';document.getElementById('btn-login').disabled=false;}
};
document.querySelectorAll('[id*="btn-logout"]').forEach(b=>b.onclick=()=>signOut(auth));
let map=null,mkrs={};
function initSup(){if(typeof L==='undefined')return;map=L.map('map').setView([6.1256,1.2244],13);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);setTimeout(()=>map.invalidateSize(),100);
  onValue(ref(db,'agents'),s=>{const a=s.val()||{};document.getElementById('sup-cnt').textContent=Object.keys(a).length;const l=document.getElementById('sup-list');l.innerHTML=Object.keys(a).length?'':'<div style="padding:8px;color:#64748b">🟡 Aucun agent</div>';Object.entries(a).forEach(([id,x])=>{const c=document.createElement('div');c.className='agent-card';c.innerHTML=`<b>${x.name||'?'}</b> <span style="color:${x.status==='online'?'#059669':'#64748b'}">● ${x.status||'off'}</span>`;c.onclick=()=>{if(mkrs[id]&&x.lat)map.setView([x.lat,x.lng],16)};l.appendChild(c);if(x.lat&&x.lng){const col=x.status==='online'?'#059669':'#94a3b8';if(!mkrs[id])mkrs[id]=L.marker([x.lat,x.lng],{icon:L.divIcon({html:`<div style="background:${col};width:12px;height:12px;border-radius:50%;border:3px solid #fff"></div>`,iconSize:[18,18]})}).addTo(map);else mkrs[id].setLatLng([x.lat,x.lng]);}});});
  onValue(ref(db,'alerts'),s=>{const d=s.val()||{},sos=document.getElementById('sup-sos');sos.innerHTML=Object.keys(d).length?'':'<div style="padding:8px;color:#64748b">✅ Aucune alerte</div>';Object.values(d).sort((a,b)=>(b.timestamp||0)-(a.timestamp||0)).forEach(a=>sos.prepend(`<div class="sos-alert">🚨 ${a.site||'?'}</div>`));});
}
document.getElementById('btn-refresh').onclick=()=>fetch('https://dedieno-demo-default-rtdb.europe-west1.firebasedatabase.app/agents.json?cache='+Date.now()).then(r=>r.json()).then(d=>initSup());
document.getElementById('btn-csv').onclick=()=>{fetch('https://dedieno-demo-default-rtdb.europe-west1.firebasedatabase.app/.json?cache='+Date.now()).then(r=>r.json()).then(d=>{let c='\uFEFFID,Nom,Site,Lat,Lng,Statut\n';if(d.agents)Object.entries(d.agents).forEach(([i,a])=>c+=`${i},"${a.name||''}","${a.site||''}",${a.lat||''},${a.lng||''},${a.status||''}\n`);const b=new Blob([c],{type:'text/csv'}),u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download='export.csv';a.click();});};
let agId=null,agRun=false;
function initAg(){}
document.getElementById('btn-gps').onclick=()=>{if(!document.getElementById('ag-name').value||!document.getElementById('ag-site').value)return alert('❌ Remplis nom et site');agId='ag_'+Math.random().toString(36).substr(2,6);document.getElementById('btn-sos').style.display='block';document.getElementById('ag-status').textContent='✅ GPS actif';agRun=true;setInterval(async()=>{if(!agRun)return;let la,lo;try{const p=await new Promise((r,j)=>navigator.geolocation.getCurrentPosition(r,j));la=p.coords.latitude;lo=p.coords.longitude;}catch{la=6.12+(Math.random()-.5)*.01;lo=1.22+(Math.random()-.5)*.01;}await set(ref(db,'agents/'+agId),{name:document.getElementById('ag-name').value,site:document.getElementById('ag-site').value,status:'online',lat:la,lng:lo,lastPing:Date.now()});},15000);};
document.getElementById('btn-sos').onclick=async()=>{if(!agId)return alert('⚠️ Active GPS');await push(ref(db,'alerts'),{agentId:agId,site:document.getElementById('ag-site').value,timestamp:Date.now()});document.getElementById('ag-status').textContent='🚨 SOS ENVOYÉ';};
</script></body></html>
