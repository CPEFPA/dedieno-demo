<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>📍 Dedienɔ – MILLES SERVICES - Togo</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    :root{--cpefpa-primary:#1e40af;--cpefpa-secondary:#059669;--cpefpa-accent:#f59e0b;--cpefpa-bg:#f8fafc;--cpefpa-card:#fff;--cpefpa-text:#1e293b;--cpefpa-muted:#64748b}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--cpefpa-bg);color:var(--cpefpa-text);display:grid;grid-template-columns:280px 1fr;min-height:100vh}
    .brand-header{padding:12px 16px;background:linear-gradient(135deg,var(--cpefpa-primary),var(--cpefpa-secondary));color:#fff;border-bottom:3px solid var(--cpefpa-accent)}
    .brand-header h2{font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px}
    .brand-header small{opacity:.9;font-weight:400}
    aside{background:var(--cpefpa-card);border-right:1px solid #e2e8f0;overflow-y:auto;display:flex;flex-direction:column}
    #map{height:100vh}
    .leaflet-popup-content-wrapper{border-radius:12px;border:2px solid var(--cpefpa-primary)}
    .card{padding:12px;margin:6px 0;border-radius:10px;background:var(--cpefpa-card);border:1px solid #e2e8f0;border-left:4px solid var(--cpefpa-secondary);cursor:pointer;transition:all 0.2s}
    .card:hover{transform:translateX(4px);box-shadow:0 4px 12px rgba(30,64,175,0.15)}
    .card.online{border-left-color:var(--cpefpa-secondary)}
    .card.offline{border-left-color:var(--cpefpa-muted);opacity:.8}
    .sos{background:#fef2f2;border:2px solid #fecaca;padding:12px;margin:6px 0;border-radius:10px;animation:pulse 1.5s infinite}
    @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0.4)}50%{box-shadow:0 0 0 12px rgba(239,68,68,0)}}
    .refresh{padding:8px 16px;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;margin:4px 0;color:#fff;transition:0.2s}
    .btn-primary{background:var(--cpefpa-primary)}.btn-primary:hover{background:#1d4ed8}
    .btn-secondary{background:var(--cpefpa-secondary)}.btn-secondary:hover{background:#047857}
    .debug{padding:6px;margin:6px 0;border-radius:6px;font-size:11px;font-family:monospace;max-height:100px;overflow-y:auto;background:#f1f5f9}
    .debug.ok{color:var(--cpefpa-secondary)}.debug.err{color:#dc2626}
    @media(max-width:768px){body{grid-template-columns:1fr}aside{max-height:40vh;border-right:none;border-bottom:1px solid #e2e8f0}}
  </style>
</head>
<body>
  <aside>
    <div class="brand-header">
      <h2><img src="logo.png" alt="Logo" style="width:24px;height:24px;border-radius:4px"/>Dedienɔ<small style="display:block;font-size:11px;margin-top:2px">MILLES SERVICES • Togo 🇹🇬</small></h2>
    </div>
    <h3 style="padding:0 12px 8px">👥 Agents (<span id="cnt">0</span>)</h3>
    <button class="refresh btn-primary" style="margin:0 12px" onclick="window.forceRefresh()">🔄 Actualiser</button>
    <button class="refresh btn-secondary" style="margin:0 12px" onclick="window.exportCSV()">📊 Exporter CSV</button>
    <button class="refresh btn-secondary" style="margin:0 12px" onclick="window.showReport()">📋 Rapport</button>
    <div id="debug" style="margin:0 12px"></div>
    <div id="list" style="padding:0 12px"></div>
    <button class="refresh btn-primary" style="margin:12px" onclick="window.logout()">🔒 Déconnexion</button>
    <h3 style="padding:16px 12px 8px;border-top:1px solid #e2e8f0;margin-top:8px">🚨 Alertes SOS</h3>
    <div id="sos" style="padding:0 12px 12px"></div>
  </aside>
  <main><div id="map"></div></main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module">
    // 🔥 Imports Firebase
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, onValue, set, push } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    // 🔥 Config Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyBhlLLm1Vvl3U3JYFZ8rzJJW4pimYDQEEU",
      authDomain: "dedieno-demo.firebaseapp.com",
      databaseURL: "https://dedieno-demo-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "dedieno-demo",
      storageBucket: "dedieno-demo.firebasestorage.app",
      messagingSenderId: "1022260862453",
      appId: "1:1022260862453:web:76282a6be081fdeedb94bc"
    };

    // 🔥 Initialisation
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    // 🔐 Protection Auth
    onAuthStateChanged(auth, user => {
      if (!user) window.location.href = "login.html";
    });

    // 🔒 Déconnexion
    window.logout = () => signOut(auth).then(() => window.location.href = "login.html");

    // 🎨 UI Helpers
    const debug = document.getElementById('debug');
    function log(msg, type = 'info') {
      if (!debug) return;
      debug.innerHTML += `<div class="debug ${type}">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
      debug.scrollTop = debug.scrollHeight;
    }
    log('🔌 Init...');

    // 🗺️ Carte Leaflet
    const map = L.map('map').setView([6.1256, 1.2244], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);
    const markers = {};

    // 🔊 SOS Sound
    function playSOS() {
      const audio = new Audio('https://actions.google.com/sounds/v1/alarms/air_horn.ogg');
      audio.volume = 1.0;
      let count = 0;
      const interval = setInterval(() => {
        audio.currentTime = 0;
        audio.play().catch(() => {});
        count++;
        if (count >= 3) clearInterval(interval);
      }, 800);
      if (navigator.vibrate) navigator.vibrate([500, 200, 500, 200, 500]);
    }

    // 🎨 Rendu Agents
    function renderAgents(data) {
      const cnt = document.getElementById('cnt');
      const list = document.getElementById('list');
      if (!cnt || !list) return;
      cnt.textContent = Object.keys(data || {}).length;
      list.innerHTML = '';
      if (!data || Object.keys(data).length === 0) {
        list.innerHTML = '<div style="color:var(--cpefpa-muted);font-size:13px;padding:8px">🟡 Aucun agent en ligne</div>';
        return;
      }
      Object.entries(data).forEach(([id, a]) => {
        const card = document.createElement('div');
        card.className = `card ${a.status === 'online' ? 'online' : 'offline'}`;
        card.innerHTML = `<b>${a.name || '?'}</b> <span style="color:${a.status==='online'?'var(--cpefpa-secondary)':'var(--cpefpa-muted)'}">● ${a.status||'off'}</span><br><small>📍 ${a.site||''}</small>`;
        card.onclick = () => { if (a.lat && a.lng) { map.setView([a.lat, a.lng], 16); markers[id]?.openPopup(); } };
        list.appendChild(card);
        if (a.lat && a.lng) {
          const color = a.status === 'online' ? 'var(--cpefpa-secondary)' : 'var(--cpefpa-muted)';
          if (!markers[id]) {
            markers[id] = L.marker([a.lat, a.lng], {
              icon: L.divIcon({
                className: 'custom-marker',
                html: `<div style="background:${color};width:14px;height:14px;border-radius:50%;border:3px solid #fff;box-shadow:0 3px 8px rgba(0,0,0,0.3)"></div>`,
                iconSize: [20, 20],
                iconAnchor: [10, 10]
              })
            }).addTo(map).bindPopup(`<b>${a.name||'Agent'}</b><br>📍 ${a.site||''}<br><small style="color:#64748b">${a.lat?.toFixed(6)}, ${a.lng?.toFixed(6)}<br>${a.accuracy?`🎯 ±${Math.round(a.accuracy)}m`:''}</small><br><small>🕐 ${a.lastPing?new Date(a.lastPing).toLocaleTimeString('fr-FR'):''}</small>`);
          } else {
            markers[id].setLatLng([a.lat, a.lng]);
          }
        }
      });
    }

    // 📡 Firebase Listeners
    onValue(ref(db, 'agents'), snap => renderAgents(snap.val()), { onlyOnce: false });

    // 🔄 Refresh manuel
    window.forceRefresh = () => {
      log('🔄 Refresh...');
      fetch('https://dedieno-demo-default-rtdb.europe-west1.firebasedatabase.app/agents.json?cache=' + Date.now())
        .then(r => r.json()).then(d => renderAgents(d))
        .catch(e => log('❌ ' + e.message, 'err'));
    };

    // 📊 Export CSV
    window.exportCSV = () => {
      log('📊 Génération CSV...');
      fetch('https://dedieno-demo-default-rtdb.europe-west1.firebasedatabase.app/.json?cache=' + Date.now())
        .then(r => r.json()).then(data => {
          let csv = '\uFEFFType,ID,Nom,Site,Lat,Lng,Date/Heure,Statut\n';
          if (data?.agents) Object.entries(data.agents).forEach(([id,a]) => {
            csv += `Agent,${id},"${a.name||''}","${a.site||''}",${a.lat||''},${a.lng||''},${a.lastPing?new Date(a.lastPing).toLocaleString('fr-FR'):''},${a.status||'off'}\n`;
          });
          if (data?.alerts) Object.entries(data.alerts).forEach(([id,a]) => {
            csv += `SOS,${id},"${a.agentName||''}","${a.site||''}",${a.lat||''},${a.lng||''},${a.timestamp?new Date(a.timestamp).toLocaleString('fr-FR'):''},Alerte envoyée\n`;
          });
          const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a'); a.href = url; a.download = `Dedieno_Export_${new Date().toISOString().slice(0,10)}.csv`;
          a.click(); URL.revokeObjectURL(url);
          log('✅ CSV téléchargé !');
        }).catch(e => log('❌ Export: ' + e.message, 'err'));
    };

    // 📋 Rapport d'Activité
    window.showReport = () => {
      const modal = document.createElement('div');
      modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:9999';
      modal.innerHTML = `<div style="background:#fff;color:#1e293b;padding:24px;border-radius:16px;max-width:420px;width:90%;box-shadow:0 20px 40px rgba(0,0,0,0.3)"><h3 style="margin:0 0 16px">📋 Rapport d'Activité</h3><label style="font-size:13px;color:#64748b">Agent</label><select id="rpt-agent" style="width:100%;padding:10px;margin:6px 0 12px;border-radius:8px;border:1px solid #cbd5e1"><option value="all">Tous les agents</option></select><label style="font-size:13px;color:#64748b">Période</label><select id="rpt-period" style="width:100%;padding:10px;margin:6px 0 12px;border-radius:8px;border:1px solid #cbd5e1"><option value="today">Aujourd'hui</option><option value="7days">7 derniers jours</option><option value="30days">30 derniers jours</option></select><div style="display:flex;gap:8px"><button id="rpt-gen" style="flex:1;padding:10px;background:#1e40af;color:#fff;border:none;border-radius:8px;cursor:pointer">Générer CSV</button><button id="rpt-close" style="flex:1;padding:10px;background:#64748b;color:#fff;border:none;border-radius:8px;cursor:pointer">Fermer</button></div></div>`;
      document.body.appendChild(modal);
      document.getElementById('rpt-close').onclick = () => modal.remove();
      document.getElementById('rpt-gen').onclick = () => generateReport();
      populateAgents();
      function populateAgents() {
        const sel = document.getElementById('rpt-agent');
        fetch('https://dedieno-demo-default-rtdb.europe-west1.firebasedatabase.app/agents.json').then(r=>r.json()).then(d=>{
          if(!d) return;
          sel.innerHTML = '<option value="all">Tous les agents</option>';
          Object.entries(d).forEach(([id,a])=>{ if(a.name) sel.innerHTML += `<option value="${id}">${a.name}</option>`; });
        });
      }
      function generateReport() {
        const agentId = document.getElementById('rpt-agent').value;
        const period = document.getElementById('rpt-period').value;
        let from, to = new Date();
        if(period==='today'){from=new Date();from.setHours(0,0,0,0);}
        else if(period==='7days'){from=new Date(Date.now()-7*86400000);}
        else{from=new Date(Date.now()-30*86400000);}
        fetch('https://dedieno-demo-default-rtdb.europe-west1.firebasedatabase.app/.json').then(r=>r.json()).then(data=>{
          let csv = '\uFEFFDate/Heure,Agent,Site,Latitude,Longitude,Statut,Événement\n';
          if(data?.agents) Object.entries(data.agents).forEach(([id,a])=>{
            if(agentId!=='all' && id!==agentId) return;
            csv += `${a.lastPing?new Date(a.lastPing).toLocaleString('fr-FR'):''},"${a.name||''}","${a.site||''}",${a.lat||''},${a.lng||''},${a.status||'off'},${a.lastPing?'Pointage GPS':''}\n`;
          });
          if(data?.alerts) Object.entries(data.alerts).forEach(([id,a])=>{
            if(agentId!=='all' && a.agentId!==agentId) return;
            csv += `${a.timestamp?new Date(a.timestamp).toLocaleString('fr-FR'):''},"${a.agentName||''}","${a.site||''}",${a.lat||''},${a.lng||''},alerte,🚨 SOS envoyé\n`;
          });
          const blob = new Blob([csv],{type:'text/csv;charset=utf-8;'});
          const url = URL.createObjectURL(blob);
          const lnk = document.createElement('a'); lnk.href=url; lnk.download=`Rapport_Dedieno_${period}_${new Date().toISOString().slice(0,10)}.csv`;
          lnk.click(); URL.revokeObjectURL(url);
          modal.remove();
          log('✅ Rapport téléchargé !');
        });
      }
    };

    // 🚨 SOS Alerts
    let played = new Set();
    onValue(ref(db, 'alerts'), snap => {
      const data = snap.val() || {};
      const sosDiv = document.getElementById('sos');
      if (!sosDiv) return;
      sosDiv.innerHTML = '';
      if (Object.keys(data).length === 0) {
        sosDiv.innerHTML = '<div style="color:var(--cpefpa-muted);font-size:13px;padding:8px">✅ Aucune alerte</div>';
        return;
      }
      Object.values(data).sort((a,b) => (b.timestamp||0) - (a.timestamp||0)).forEach(a => {
        const el = document.createElement('div');
        el.className = 'sos';
        el.innerHTML = `🚨 <b>${a.site||'?'}</b><br><small>👤 ${a.agentName||'?'}</small><br><small>🕐 ${a.timestamp?new Date(a.timestamp).toLocaleString('fr-FR'):''}</small>`;
        sosDiv.prepend(el);
        if (a.id && !played.has(a.id)) { playSOS(); played.add(a.id); }
      });
    });

    log('🗺️ Dashboard prêt');
  </script>
</body>
</html>
