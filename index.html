<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>Dedienɔ Dashboard</title><link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui;background:#f1f5f9;display:grid;grid-template-columns:260px 1fr;min-height:100vh}aside{background:#fff;padding:12px;border-right:1px solid #e2e8f0;overflow-y:auto;display:flex;flex-direction:column}#map{height:100vh}.card{padding:10px;margin:6px 0;border-radius:6px;background:#fff;border:1px solid #e2e8f0}.online{border-left:4px solid #22c55e}.offline{border-left:4px solid #94a3b8;opacity:.7}.sos{background:#fef2f2;border:1px solid #fecaca;padding:10px;margin:6px 0;border-radius:6px}.status{padding:8px;margin:8px 0;border-radius:6px;font-size:12px}.status.ok{background:#dcfce7;color:#166534}.status.err{background:#fee2e2;color:#991b1b}@media(max-width:768px){body{grid-template-columns:1fr}aside{max-height:40vh}}</style></head><body><aside><h3>👥 Agents (<span id="cnt">0</span>)</h3><div id="conn-status"></div><div id="list"></div><h3 style="margin-top:16px">🚨 SOS</h3><div id="sos"></div></aside><main><div id="map"></div></main><script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script><script type="module">
import{db,ref,onValue}from'./js/firebase-config.js';

// 🗺️ Carte
const map=L.map('map').setView([6.1256,1.2244],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OSM'}).addTo(map);

// 📊 Éléments UI
const cntEl=document.getElementById('cnt');
const listEl=document.getElementById('list');
const sosEl=document.getElementById('sos');
const statusEl=document.getElementById('conn-status');

// 🟢 Indicateur de connexion
function setStatus(msg,type='ok'){
  statusEl.innerHTML=`<div class="status ${type}">📡 ${msg}</div>`;
}
setStatus('Connexion à Firebase...');

const mkrs={},agentsRef=ref(db,'agents'),alertsRef=ref(db,'alerts');

// 📡 Écoute des agents
onValue(agentsRef,{
  next:(snapshot)=>{
    setStatus('✅ Connecté à Firebase','ok');
    const d=snapshot.val()||{};
    cntEl.textContent=Object.keys(d).length;
    listEl.innerHTML='';
    
    if(Object.keys(d).length===0){
      listEl.innerHTML='<div style="color:#64748b;font-size:13px;padding:8px">Aucun agent en ligne</div>';
    }
    
    Object.entries(d).forEach(([id,a])=>{
      const c=document.createElement('div');
      c.className=`card ${a.status||'offline'}`;
      c.innerHTML=`<b>${a.name||'?'}</b> <span style="color:${a.status==='online'?'#22c55e':'#94a3b8'}">● ${a.status||'off'}</span><br><small>📍 ${a.site||''}</small><br><small>🕐 ${a.lastPing?new Date(a.lastPing).toLocaleTimeString('fr-FR'):''}</small>`;
      listEl.appendChild(c);
      
      if(a.lat&&a.lng){
        const col=a.status==='online'?'#22c55e':'#94a3b8';
        if(!mkrs[id]){
          mkrs[id]=L.marker([a.lat,a.lng],{icon:L.divIcon({className:'c',html:`<div style="background:${col};width:12px;height:12px;border-radius:50%;border:2px solid #fff"></div>`,iconSize:[16,16]})}).addTo(map).bindPopup(`<b>${a.name||'Agent'}</b><br>${a.site||''}`);
        }else{
          mkrs[id].setLatLng([a.lat,a.lng]);
        }
      }
    });
  },
  error:(err)=>{
    console.error('❌ Erreur agents:',err);
    setStatus(`Erreur: ${err.message||err}`,'err');
    listEl.innerHTML='<div style="color:#991b1b;font-size:13px;padding:8px">⚠️ Impossible de charger les agents<br><small>Vérifie firebase-config.js et les règles Firebase</small></div>';
  }
});

// 🚨 Écoute des alertes SOS
let playedIds=new Set();
onValue(alertsRef,{
  next:(snapshot)=>{
    const d=snapshot.val()||{};
    sosEl.innerHTML='';
    
    if(Object.keys(d).length===0){
      sosEl.innerHTML='<div style="color:#64748b;font-size:13px;padding:8px">Aucune alerte</div>';
      return;
    }
    
    Object.values(d).sort((a,b)=>(b.timestamp||0)-(a.timestamp||0)).forEach(a=>{
      const c=document.createElement('div');
      c.className='sos';
      c.innerHTML=`🚨 <b>${a.site||'?'}</b><br><small>👤 ${a.agentName||'?'}</small><br><small>🕐 ${a.timestamp?new Date(a.timestamp).toLocaleString('fr-FR'):''}</small>`;
      sosEl.prepend(c);
      
      if(a.id&&!playedIds.has(a.id)){
        new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg').play().catch(()=>{});
        playedIds.add(a.id);
      }
    });
  },
  error:(err)=>{
    console.error('❌ Erreur SOS:',err);
  }
});

// 🎯 Clic carte = recentrer
map.on('click',()=>map.closePopup());
</script></body></html>
